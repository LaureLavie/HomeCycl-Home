version: '3.8'

services:
  app:
    image: lorlaviedevdesign/homecyclhome:latest
    container_name: homecyclhome_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - app-network

networks:
  app-network:
    driver: bridge